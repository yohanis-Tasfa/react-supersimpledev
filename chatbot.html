<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input placeholder="send a message to chatbot" size="30" />
            <button>send</button>
          </>
        );
      }

      function ChatMessage(props) {
        // const message = props.message;
        // const sender = props.sender;

        const { message, sender } = props; // destructuring

        /*  if (sender === "robot") {
          return (
            <div>
              <img src="robot.png" alt="" width="50" />
              {message}
            </div>
          );
        }
      */

        return (
          <div>
            {sender === "robot" && <img src="robot.png" alt="" width="50" />}
            {message}
            {sender === "user" && <img src="./user.png" alt="" width="50" />}
          </div>
        );
      }

      function ChatMessages() {
        const [chatmessages, setChatMessages] = React.useState([
          {
            message: "hello chatbot",
            sender: "user",
            id: 1,
          },
          {
            message: "hello how can i help you",
            sender: "robot",
            id: 2,
          },
          {
            message: "can you get me todays date?",
            sender: "user",
            id: 3,
          },
          {
            message: "today is september march 10",
            sender: "robot",
            id: 4,
          },
        ]);

        function sendMessages() {
          setChatMessages([
            ...chatmessages, // copy the original of chatmessages before update
            {
              message: "test",
              sender: "user",
              id: crypto.randomUUID(),
            },
          ]);
        }

        return (
          <>
            <button onClick={sendMessages}>send message</button>
            {chatmessages.map((chatmessage) => {
              return (
                <ChatMessage
                  message={chatmessage.message}
                  sender={chatmessage.sender}
                  key={chatmessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        return (
          <>
            <ChatInput />
            <ChatMessages />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
